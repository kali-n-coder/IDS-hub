<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>おみくじ | IDS Hub</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --ink: #132033;
      --muted: #66758a;
      --panel: #fff;
      --line: #dce4ee;
      --brand: #0969da;
      --brand-dark: #044da4;
      --green: #00876f;
      --yellow: #d98900;
      --red: #d64562;
      --dark: #172232;
      --shadow: 0 20px 55px rgba(24, 39, 58, .14);
      --radius: 8px;
      font-family: "Inter", "Noto Sans JP", "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 8%, rgba(9, 105, 218, .12), transparent 28%),
        radial-gradient(circle at 88% 22%, rgba(0, 135, 111, .11), transparent 30%),
        var(--bg);
      color: var(--ink);
    }

    a { color: inherit; }
    button { font: inherit; cursor: pointer; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 14px clamp(16px, 4vw, 42px);
      border-bottom: 1px solid rgba(220, 228, 238, .9);
      background: rgba(255, 255, 255, .88);
      backdrop-filter: blur(14px);
    }

    .brand, .back-link, .ghost-button, .primary-button {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      font-weight: 800;
      white-space: nowrap;
    }

    .brand { gap: 12px; min-width: 0; }

    .brand-mark {
      width: 54px;
      height: 40px;
      border-radius: var(--radius);
      display: block;
      object-fit: contain;
      background: #fff;
      padding: 4px;
      box-shadow: 0 12px 26px rgba(9, 105, 218, .22);
    }

    .brand span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .back-link, .ghost-button, .primary-button {
      min-height: 40px;
      padding: 0 14px;
      border-radius: var(--radius);
    }

    .back-link, .ghost-button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
    }

    .primary-button {
      border: 0;
      background: var(--brand);
      color: #fff;
    }

    .icon {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex: 0 0 auto;
    }

    main {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 28px clamp(14px, 4vw, 42px) 48px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, .9fr) minmax(330px, 1.1fr);
      overflow: hidden;
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(9, 105, 218, .34), rgba(0, 135, 111, .16)),
        #101b2d;
      box-shadow: var(--shadow);
    }

    .hero-copy {
      padding: clamp(28px, 5vw, 54px);
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
    }

    .eyebrow {
      margin: 0;
      color: #89e3d3;
      font-size: 13px;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: clamp(38px, 6vw, 68px);
      line-height: 1.03;
      letter-spacing: 0;
    }

    .hero-copy p:not(.eyebrow) {
      margin: 0;
      color: #d7e2ef;
      font-size: 16px;
      line-height: 1.85;
    }

    .fortune-wrap {
      position: relative;
      margin: clamp(14px, 3vw, 24px);
      min-height: 620px;
      display: grid;
      align-content: center;
      gap: 16px;
      padding: clamp(18px, 3vw, 28px);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: var(--radius);
      background: rgba(255,255,255,.94);
      box-shadow: 0 24px 50px rgba(0,0,0,.16);
      overflow: hidden;
    }

    .fortune-wrap::before {
      content: "";
      position: absolute;
      inset: 18px;
      border: 1px solid rgba(9,105,218,.12);
      border-radius: var(--radius);
      pointer-events: none;
    }

    .ticket {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 14px;
      min-height: 390px;
      padding: clamp(20px, 4vw, 34px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
      transform-origin: 50% 8%;
      box-shadow: 0 12px 30px rgba(24,39,58,.09);
    }

    .ticket.is-drawing { animation: drawSlip .78s cubic-bezier(.2,.8,.2,1); }

    @keyframes drawSlip {
      0% { transform: translateY(-28px) rotate(-1deg); opacity: .2; }
      45% { transform: translateY(8px) rotate(1deg); opacity: 1; }
      100% { transform: translateY(0) rotate(0); }
    }

    .category {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      justify-self: start;
      min-height: 32px;
      padding: 0 12px;
      border-radius: var(--radius);
      background: rgba(9,105,218,.1);
      color: var(--brand-dark);
      font-size: 13px;
      font-weight: 900;
    }

    .result {
      margin: 0;
      color: var(--brand);
      font-size: clamp(54px, 11vw, 96px);
      line-height: 1;
      letter-spacing: 0;
    }

    .reading {
      margin: 0;
      color: var(--ink);
      font-size: 17px;
      line-height: 1.8;
      font-weight: 800;
    }

    .fortune-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .fortune-cell {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #f7faff;
    }

    .fortune-cell span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .fortune-cell strong {
      display: block;
      margin-top: 6px;
      font-size: 16px;
      line-height: 1.4;
    }

    .actions {
      position: relative;
      z-index: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .hint {
      position: relative;
      z-index: 1;
      min-height: 24px;
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 800;
    }

    .history {
      margin-top: 22px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .history article {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
    }

    .history strong {
      display: block;
      color: var(--ink);
      font-size: 18px;
    }

    .history span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .burst {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--green);
      opacity: 0;
      pointer-events: none;
      animation: burst 900ms ease-out forwards;
    }

    @keyframes burst {
      0% { transform: translate(0, 0) scale(.4); opacity: .9; }
      100% { transform: translate(var(--x), var(--y)) scale(1); opacity: 0; }
    }

    @media (max-width: 860px) {
      .hero { grid-template-columns: 1fr; }
      .fortune-wrap { min-height: auto; }
      .history { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 560px) {
      .topbar { align-items: flex-start; flex-direction: column; }
      .back-link { width: 100%; justify-content: center; }
      main { padding-left: 0; padding-right: 0; }
      .hero { border-radius: 0; }
      .fortune-wrap { margin: 0; border-radius: 0; }
      .fortune-grid, .history { grid-template-columns: 1fr; }
      .actions > * { flex: 1 1 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="../index.html">
      <img class="brand-mark" src="../assets/ids-logo.png" alt="IDS">
      <span>IDS Hub<br>Tools and Games</span>
    </a>
    <a class="back-link" href="../index.html">
      <svg class="icon" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"></path></svg>
      Hubへ戻る
    </a>
  </header>

  <main>
    <section class="hero" aria-labelledby="pageTitle">
      <div class="hero-copy">
        <p class="eyebrow">Omikuji</p>
        <h1 id="pageTitle">おみくじ</h1>
        <p>今日の運勢を一枚。毎日固定の運勢と、その場で引けるランダムおみくじを選べます。</p>
      </div>

      <div class="fortune-wrap" id="stage">
        <article class="ticket" id="ticket" aria-live="polite">
          <span class="category" id="category">今日のおみくじ</span>
          <h2 class="result" id="result">吉</h2>
          <p class="reading" id="reading">少し整えるだけで、流れが見えやすくなる日です。</p>
          <div class="fortune-grid">
            <div class="fortune-cell"><span>ラッキーアイテム</span><strong id="item">ノート</strong></div>
            <div class="fortune-cell"><span>ラッキーカラー</span><strong id="color">青</strong></div>
            <div class="fortune-cell"><span>ラッキーアクション</span><strong id="action">机を整える</strong></div>
          </div>
        </article>

        <div class="actions">
          <button class="primary-button" id="dailyButton" type="button">
            <svg class="icon" viewBox="0 0 24 24"><path d="M8 2v4"></path><path d="M16 2v4"></path><path d="M3 10h18"></path><path d="M5 4h14v18H5z"></path></svg>
            今日の運勢
          </button>
          <button class="ghost-button" id="randomButton" type="button">
            <svg class="icon" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><path d="m7.5 4.2 9 5.2"></path><path d="M7.5 19.8v-10.4L3.3 7"></path><path d="M16.5 19.8V9.4L20.7 7"></path></svg>
            ランダムに引く
          </button>
          <button class="ghost-button" id="copyButton" type="button">
            <svg class="icon" viewBox="0 0 24 24"><path d="M8 8h11v11H8z"></path><path d="M5 15H4a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v1"></path></svg>
            共有 / コピー
          </button>
        </div>
        <p class="hint" id="hint">今日の運勢は日付ごとに同じ結果になります。</p>
      </div>
    </section>

    <section class="history" aria-label="運勢カテゴリ">
      <article><strong>大吉</strong><span>勢いに乗れる日</span></article>
      <article><strong>中吉</strong><span>準備が効く日</span></article>
      <article><strong>吉</strong><span>整えるほど進む日</span></article>
      <article><strong>小吉</strong><span>小さな選択が光る日</span></article>
    </section>
  </main>

  <script>
    const fortunes = [
      { rank: "大吉", category: "最高運", text: "新しいことを始める追い風があります。遠慮せず、最初の一歩を軽く出してみましょう。", item: "白いマグカップ", color: "水色", action: "午前中に大事な連絡" },
      { rank: "中吉", category: "成長運", text: "続けてきたことに手応えが出る日です。見直しを一つ入れると、結果がさらに締まります。", item: "付箋", color: "若草色", action: "予定を3つに絞る" },
      { rank: "吉", category: "安定運", text: "少し整えるだけで、流れが見えやすくなる日です。焦らず、順番に片づけるのが吉。", item: "ノート", color: "青", action: "机を整える" },
      { rank: "小吉", category: "発見運", text: "小さな気づきが後から効いてきます。違和感をメモしておくと、よいヒントになります。", item: "細いペン", color: "銀色", action: "5分だけ散歩" },
      { rank: "末吉", category: "準備運", text: "今日は土台を作る日です。派手な結果より、明日の自分が助かる準備を選びましょう。", item: "ハンカチ", color: "紺", action: "早めに切り上げる" },
      { rank: "凶", category: "慎重運", text: "急がば回れの日です。送信前の確認と、ひと呼吸置く判断があなたを守ります。", item: "温かいお茶", color: "白", action: "チェックリストを作る" }
    ];

    const resultEl = document.querySelector("#result");
    const categoryEl = document.querySelector("#category");
    const readingEl = document.querySelector("#reading");
    const itemEl = document.querySelector("#item");
    const colorEl = document.querySelector("#color");
    const actionEl = document.querySelector("#action");
    const ticket = document.querySelector("#ticket");
    const stage = document.querySelector("#stage");
    const hint = document.querySelector("#hint");
    const dailyButton = document.querySelector("#dailyButton");
    const randomButton = document.querySelector("#randomButton");
    const copyButton = document.querySelector("#copyButton");
    let current = fortunes[2];
    let currentMode = "今日のおみくじ";

    function todaySeed() {
      const now = new Date();
      const key = `${now.getFullYear()}-${now.getMonth() + 1}-${now.getDate()}`;
      return [...key].reduce((sum, char) => sum + char.charCodeAt(0), 0);
    }

    function seededFortune() {
      const seed = todaySeed();
      return fortunes[(seed * 7 + 3) % fortunes.length];
    }

    function randomFortune() {
      return fortunes[Math.floor(Math.random() * fortunes.length)];
    }

    function render(fortune, mode) {
      current = fortune;
      currentMode = mode;
      categoryEl.textContent = `${mode} / ${fortune.category}`;
      resultEl.textContent = fortune.rank;
      readingEl.textContent = fortune.text;
      itemEl.textContent = fortune.item;
      colorEl.textContent = fortune.color;
      actionEl.textContent = fortune.action;
      ticket.classList.remove("is-drawing");
      window.requestAnimationFrame(() => {
        ticket.classList.add("is-drawing");
        createBurst();
      });
    }

    function createBurst() {
      [...stage.querySelectorAll(".burst")].forEach((dot) => dot.remove());
      const colors = ["#0969da", "#00876f", "#d98900", "#d64562"];
      for (let i = 0; i < 18; i += 1) {
        const dot = document.createElement("span");
        const angle = (Math.PI * 2 * i) / 18;
        const distance = 90 + Math.random() * 80;
        dot.className = "burst";
        dot.style.left = "50%";
        dot.style.top = "38%";
        dot.style.background = colors[i % colors.length];
        dot.style.setProperty("--x", `${Math.cos(angle) * distance}px`);
        dot.style.setProperty("--y", `${Math.sin(angle) * distance}px`);
        stage.appendChild(dot);
      }
    }

    function resultText() {
      return `IDS Hub おみくじ\n${currentMode}: ${current.rank} (${current.category})\n${current.text}\nラッキーアイテム: ${current.item}\nラッキーカラー: ${current.color}\nラッキーアクション: ${current.action}`;
    }

    async function copyResult() {
      const text = resultText();
      try {
        if (navigator.share) {
          await navigator.share({ title: "IDS Hub おみくじ", text });
          hint.textContent = "結果を共有しました。";
          return;
        }
        await navigator.clipboard.writeText(text);
        hint.textContent = "結果をコピーしました。";
      } catch (error) {
        try {
          await navigator.clipboard.writeText(text);
          hint.textContent = "結果をコピーしました。";
        } catch (clipboardError) {
          const encodedSubject = encodeURIComponent("IDS Hub おみくじ");
          const encodedBody = encodeURIComponent(text);
          location.href = `mailto:?subject=${encodedSubject}&body=${encodedBody}`;
          hint.textContent = "共有できない環境のため、メール作成を開きました。";
        }
      }
    }

    dailyButton.addEventListener("click", () => {
      render(seededFortune(), "今日のおみくじ");
      hint.textContent = "今日の運勢は日付ごとに同じ結果になります。";
    });

    randomButton.addEventListener("click", () => {
      render(randomFortune(), "ランダムおみくじ");
      hint.textContent = "もう一度押すと、別の一枚を引けます。";
    });

    copyButton.addEventListener("click", copyResult);
    render(seededFortune(), "今日のおみくじ");
  </script>
</body>
</html>
