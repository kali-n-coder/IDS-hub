<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>文字数カウンター | IDS Hub</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --ink: #132033;
      --muted: #66758a;
      --panel: #fff;
      --line: #dce4ee;
      --brand: #0969da;
      --brand-dark: #044da4;
      --green: #00876f;
      --yellow: #d98900;
      --red: #d64562;
      --shadow: 0 20px 55px rgba(24, 39, 58, .14);
      --radius: 8px;
      font-family: "Inter", "Noto Sans JP", "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 8%, rgba(9, 105, 218, .12), transparent 28%),
        radial-gradient(circle at 88% 22%, rgba(0, 135, 111, .11), transparent 30%),
        var(--bg);
      color: var(--ink);
    }

    a { color: inherit; }
    button, textarea { font: inherit; }
    button { cursor: pointer; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 14px clamp(16px, 4vw, 42px);
      border-bottom: 1px solid rgba(220, 228, 238, .9);
      background: rgba(255, 255, 255, .88);
      backdrop-filter: blur(14px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      text-decoration: none;
      font-weight: 800;
    }

    .brand-mark {
      width: 54px;
      height: 40px;
      border-radius: var(--radius);
      display: block;
      flex: 0 0 auto;
      object-fit: contain;
      background: #fff;
      padding: 4px;
      box-shadow: 0 12px 26px rgba(9, 105, 218, .22);
    }

    .brand span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav a,
    .ghost-button,
    .primary-button {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
      border-radius: var(--radius);
      font-weight: 800;
      text-decoration: none;
      white-space: nowrap;
    }

    .nav a {
      color: var(--muted);
      font-size: 14px;
    }

    .ghost-button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
    }

    .primary-button {
      border: 0;
      background: var(--brand);
      color: #fff;
    }

    .icon {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex: 0 0 auto;
    }

    main {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 28px clamp(14px, 4vw, 42px) 48px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 380px);
      overflow: hidden;
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(9, 105, 218, .34), rgba(0, 135, 111, .16)),
        #101b2d;
      box-shadow: var(--shadow);
    }

    .hero-copy {
      padding: clamp(30px, 5vw, 56px);
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
    }

    .eyebrow {
      margin: 0;
      color: #89e3d3;
      font-size: 13px;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: clamp(36px, 5vw, 60px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .hero-copy p:not(.eyebrow) {
      margin: 0;
      max-width: 640px;
      color: #d7e2ef;
      font-size: 16px;
      line-height: 1.85;
    }

    .hero-meter {
      display: grid;
      align-content: center;
      gap: 12px;
      padding: 28px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.12), rgba(255,255,255,0)),
        rgba(255,255,255,.06);
    }

    .meter-row {
      display: grid;
      gap: 7px;
      padding: 13px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: var(--radius);
      background: rgba(255,255,255,.1);
    }

    .meter-label {
      display: flex;
      justify-content: space-between;
      color: #fff;
      font-size: 12px;
      font-weight: 800;
    }

    .meter-track {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,.18);
    }

    .meter-fill {
      width: 72%;
      height: 100%;
      border-radius: inherit;
      background: #89e3d3;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, .95fr);
      gap: 18px;
      margin-top: 18px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: 0 8px 22px rgba(24, 39, 58, .06);
    }

    .editor-panel {
      padding: clamp(18px, 3vw, 24px);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .editor-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .editor-head label {
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
    }

    textarea {
      width: 100%;
      min-height: 430px;
      resize: vertical;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      outline: 0;
      background: #fff;
      color: var(--ink);
      line-height: 1.75;
    }

    textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 4px rgba(9, 105, 218, .11);
    }

    .stats-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      border-bottom: 1px solid var(--line);
    }

    .stat {
      min-height: 112px;
      padding: 16px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 12px;
    }

    .stat:nth-child(2n) { border-right: 0; }
    .stat:nth-last-child(-n+2) { border-bottom: 0; }

    .stat span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .stat strong {
      font-size: clamp(25px, 4vw, 36px);
      line-height: 1;
      letter-spacing: 0;
    }

    .limits {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .limit {
      display: grid;
      gap: 8px;
    }

    .limit-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      font-weight: 800;
    }

    .limit-top span:last-child {
      color: var(--muted);
      white-space: nowrap;
    }

    .limit-track {
      height: 9px;
      overflow: hidden;
      border-radius: 999px;
      background: #eef3f8;
    }

    .limit-fill {
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: var(--green);
      transition: width .18s ease, background .18s ease;
    }

    .limit-fill.warn { background: var(--yellow); }
    .limit-fill.over { background: var(--red); }

    .quick-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      max-width: min(360px, calc(100vw - 36px));
      padding: 12px 14px;
      border-radius: var(--radius);
      background: #132033;
      color: #fff;
      box-shadow: var(--shadow);
      transform: translateY(90px);
      opacity: 0;
      transition: .2s ease;
      font-size: 14px;
      font-weight: 800;
    }

    .toast.visible {
      transform: translateY(0);
      opacity: 1;
    }

    @media (max-width: 900px) {
      .hero,
      .workspace { grid-template-columns: 1fr; }
      .hero-meter { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      textarea { min-height: 360px; }
    }

    @media (max-width: 620px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }
      .nav {
        width: 100%;
        flex-wrap: wrap;
        justify-content: flex-start;
      }
      .nav a { display: none; }
      .nav .ghost-button { display: inline-flex; }
      .brand span { font-size: 11px; }
      .hero-copy { padding: 28px 20px; }
      .hero-copy p:not(.eyebrow) { overflow-wrap: anywhere; }
      .hero-meter { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr; }
      .stat,
      .stat:nth-child(2n),
      .stat:nth-last-child(-n+2) {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .stat:last-child { border-bottom: 0; }
      .editor-head { align-items: flex-start; flex-direction: column; }
      .quick-actions > * { width: 100%; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="../index.html">
      <img class="brand-mark" src="../assets/ids-logo.png" alt="IDS">
      <span>IDS Hub<br>Tools and Games</span>
    </a>
    <nav class="nav" aria-label="メインメニュー">
      <a href="../index.html#tools">ツール</a>
      <a href="../index.html#about">特徴</a>
      <a class="ghost-button" href="../index.html">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"></path></svg>
        Hubへ戻る
      </a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Utility</p>
        <h1>文字数カウンター</h1>
        <p>文章を貼り付けるだけで、文字数、行数、単語数、UTF-8バイト数、読了時間をリアルタイムに確認できます。</p>
      </div>
      <div class="hero-meter" aria-hidden="true">
        <div class="meter-row">
          <div class="meter-label"><span>X</span><span>72%</span></div>
          <div class="meter-track"><div class="meter-fill"></div></div>
        </div>
        <div class="meter-row">
          <div class="meter-label"><span>Note</span><span>48%</span></div>
          <div class="meter-track"><div class="meter-fill" style="width:48%;background:#fff;"></div></div>
        </div>
        <div class="meter-row">
          <div class="meter-label"><span>Meta</span><span>86%</span></div>
          <div class="meter-track"><div class="meter-fill" style="width:86%;background:#d98900;"></div></div>
        </div>
      </div>
    </section>

    <section class="workspace" aria-label="文字数カウント">
      <div class="panel editor-panel">
        <div class="editor-head">
          <label for="textInput">入力テキスト</label>
          <div class="quick-actions">
            <button class="ghost-button" id="copyButton" type="button">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
              コピー
            </button>
            <button class="ghost-button" id="clearButton" type="button">
              <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path></svg>
              クリア
            </button>
          </div>
        </div>
        <textarea id="textInput" spellcheck="false">IDS Hubは、日常の作業を少し軽くするためのツールを集めた場所です。
短い投稿文から長めの説明文まで、文字量をすばやく確認できます。</textarea>
      </div>

      <div class="panel stats-panel">
        <div class="stats-grid">
          <div class="stat"><span>文字数（空白含む）</span><strong id="charsWithSpaces">0</strong></div>
          <div class="stat"><span>文字数（空白除く）</span><strong id="charsNoSpaces">0</strong></div>
          <div class="stat"><span>行数</span><strong id="lineCount">0</strong></div>
          <div class="stat"><span>単語数</span><strong id="wordCount">0</strong></div>
          <div class="stat"><span>UTF-8バイト</span><strong id="byteCount">0</strong></div>
          <div class="stat"><span>読了時間</span><strong id="readingTime">0秒</strong></div>
        </div>

        <div class="limits" aria-label="文字数上限">
          <div class="limit" data-limit="140">
            <div class="limit-top"><span>X投稿</span><span id="xLimit">0 / 140</span></div>
            <div class="limit-track"><div class="limit-fill" id="xFill"></div></div>
          </div>
          <div class="limit" data-limit="300">
            <div class="limit-top"><span>Meta広告見出し</span><span id="metaLimit">0 / 300</span></div>
            <div class="limit-track"><div class="limit-fill" id="metaFill"></div></div>
          </div>
          <div class="limit" data-limit="500">
            <div class="limit-top"><span>短文メモ</span><span id="noteLimit">0 / 500</span></div>
            <div class="limit-track"><div class="limit-fill" id="noteFill"></div></div>
          </div>
          <div class="limit" data-limit="1200">
            <div class="limit-top"><span>説明文</span><span id="descLimit">0 / 1200</span></div>
            <div class="limit-track"><div class="limit-fill" id="descFill"></div></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const textInput = document.getElementById("textInput");
    const charsWithSpaces = document.getElementById("charsWithSpaces");
    const charsNoSpaces = document.getElementById("charsNoSpaces");
    const lineCount = document.getElementById("lineCount");
    const wordCount = document.getElementById("wordCount");
    const byteCount = document.getElementById("byteCount");
    const readingTime = document.getElementById("readingTime");
    const copyButton = document.getElementById("copyButton");
    const clearButton = document.getElementById("clearButton");
    const toast = document.getElementById("toast");
    const encoder = new TextEncoder();
    let toastTimer;

    const limits = [
      { limit: 140, label: document.getElementById("xLimit"), fill: document.getElementById("xFill") },
      { limit: 300, label: document.getElementById("metaLimit"), fill: document.getElementById("metaFill") },
      { limit: 500, label: document.getElementById("noteLimit"), fill: document.getElementById("noteFill") },
      { limit: 1200, label: document.getElementById("descLimit"), fill: document.getElementById("descFill") }
    ];

    function formatNumber(value) {
      return new Intl.NumberFormat("ja-JP").format(value);
    }

    function splitGraphemes(text) {
      if (Intl.Segmenter) {
        return [...new Intl.Segmenter("ja", { granularity: "grapheme" }).segment(text)].map((part) => part.segment);
      }
      return Array.from(text);
    }

    function countTokens(text) {
      const matches = text.match(/[A-Za-z0-9]+|[\u3040-\u30ff]+|[\u3400-\u9fff]/g);
      return matches ? matches.length : 0;
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("visible");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("visible"), 2200);
    }

    function updateLimits(count) {
      limits.forEach((item) => {
        const ratio = item.limit === 0 ? 0 : count / item.limit;
        item.label.textContent = `${formatNumber(count)} / ${formatNumber(item.limit)}`;
        item.fill.style.width = `${Math.min(ratio * 100, 100)}%`;
        item.fill.classList.toggle("warn", ratio >= .85 && ratio <= 1);
        item.fill.classList.toggle("over", ratio > 1);
      });
    }

    function updateStats() {
      const text = textInput.value;
      const graphemes = splitGraphemes(text);
      const countWithSpaces = graphemes.length;
      const countNoSpaces = splitGraphemes(text.replace(/\s/g, "")).length;
      const lines = text.length ? text.split(/\r\n|\r|\n/).length : 0;
      const tokens = countTokens(text);
      const bytes = encoder.encode(text).length;
      const minutes = Math.max(0, Math.ceil(countNoSpaces / 500));

      charsWithSpaces.textContent = formatNumber(countWithSpaces);
      charsNoSpaces.textContent = formatNumber(countNoSpaces);
      lineCount.textContent = formatNumber(lines);
      wordCount.textContent = formatNumber(tokens);
      byteCount.textContent = formatNumber(bytes);
      readingTime.textContent = minutes < 1 ? "0秒" : `${minutes}分`;
      updateLimits(countWithSpaces);
    }

    async function copyText() {
      const value = textInput.value;
      if (!value) {
        showToast("コピーするテキストがありません");
        return;
      }

      try {
        await navigator.clipboard.writeText(value);
        showToast("テキストをコピーしました");
      } catch (error) {
        textInput.select();
        document.execCommand("copy");
        showToast("テキストをコピーしました");
      }
    }

    function clearText() {
      textInput.value = "";
      updateStats();
      textInput.focus();
      showToast("入力をクリアしました");
    }

    textInput.addEventListener("input", updateStats);
    copyButton.addEventListener("click", copyText);
    clearButton.addEventListener("click", clearText);
    updateStats();
  </script>
</body>
</html>
