<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QRコード生成ツール | IDS Hub</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --ink: #132033;
      --muted: #66758a;
      --panel: #fff;
      --line: #dce4ee;
      --brand: #0969da;
      --brand-dark: #044da4;
      --green: #00876f;
      --shadow: 0 20px 55px rgba(24, 39, 58, .14);
      --radius: 8px;
      font-family: "Inter", "Noto Sans JP", "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 8%, rgba(9, 105, 218, .12), transparent 28%),
        radial-gradient(circle at 88% 22%, rgba(0, 135, 111, .11), transparent 30%),
        var(--bg);
      color: var(--ink);
    }

    a { color: inherit; }
    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 14px clamp(16px, 4vw, 42px);
      border-bottom: 1px solid rgba(220, 228, 238, .9);
      background: rgba(255, 255, 255, .88);
      backdrop-filter: blur(14px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      text-decoration: none;
      font-weight: 800;
    }

    .brand-mark {
      width: 54px;
      height: 40px;
      border-radius: var(--radius);
      display: block;
      flex: 0 0 auto;
      object-fit: contain;
      background: #fff;
      padding: 4px;
      box-shadow: 0 12px 26px rgba(9, 105, 218, .22);
    }

    .brand span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav a,
    .ghost-button,
    .primary-button {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
      border-radius: var(--radius);
      font-weight: 800;
      text-decoration: none;
      white-space: nowrap;
    }

    .nav a {
      color: var(--muted);
      font-size: 14px;
    }

    .ghost-button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
    }

    .primary-button {
      border: 0;
      background: var(--brand);
      color: #fff;
    }

    .icon {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex: 0 0 auto;
    }

    main {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 28px clamp(14px, 4vw, 42px) 48px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 390px);
      gap: clamp(22px, 4vw, 42px);
      align-items: stretch;
      overflow: hidden;
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, rgba(9, 105, 218, .34), rgba(0, 135, 111, .16)),
        #101b2d;
      box-shadow: var(--shadow);
    }

    .hero-copy {
      padding: clamp(30px, 5vw, 56px);
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
    }

    .eyebrow {
      margin: 0;
      color: #89e3d3;
      font-size: 13px;
      font-weight: 800;
    }

    h1 {
      margin: 0;
      font-size: clamp(36px, 5vw, 60px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .hero-copy p:not(.eyebrow) {
      margin: 0;
      max-width: 630px;
      color: #d7e2ef;
      font-size: 16px;
      line-height: 1.85;
    }

    .sample-qr {
      min-height: 300px;
      display: grid;
      place-items: center;
      padding: 28px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.12), rgba(255,255,255,0)),
        rgba(255,255,255,.06);
    }

    .qr-motif {
      width: min(230px, 70vw);
      aspect-ratio: 1;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      padding: 22px;
      border: 1px solid rgba(255,255,255,.24);
      border-radius: var(--radius);
      background: rgba(255,255,255,.92);
      box-shadow: 0 24px 50px rgba(0,0,0,.18);
    }

    .qr-motif span {
      border-radius: 3px;
      background: #132033;
    }

    .qr-motif span:nth-child(3n),
    .qr-motif span:nth-child(5n) { background: #0969da; }
    .qr-motif span:nth-child(4n) { opacity: .2; }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(300px, .9fr);
      gap: 18px;
      margin-top: 18px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: 0 8px 22px rgba(24, 39, 58, .06);
    }

    .input-panel {
      padding: clamp(18px, 3vw, 24px);
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    label {
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
    }

    textarea,
    select,
    input[type="color"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      outline: 0;
      background: #fff;
      color: var(--ink);
    }

    textarea {
      min-height: 190px;
      resize: vertical;
      padding: 14px;
      line-height: 1.7;
    }

    textarea:focus,
    select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 4px rgba(9, 105, 218, .11);
    }

    select {
      min-height: 44px;
      padding: 0 12px;
    }

    .control-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    input[type="color"] {
      height: 44px;
      padding: 5px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .preview-panel {
      display: flex;
      flex-direction: column;
      min-height: 430px;
    }

    .preview-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }

    .preview-head h2 {
      margin: 0;
      font-size: 16px;
    }

    .status {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .qr-stage {
      flex: 1;
      display: grid;
      place-items: center;
      min-height: 300px;
      padding: 28px;
    }

    #qrPreview {
      display: grid;
      place-items: center;
      max-width: 100%;
      overflow: auto;
    }

    #qrPreview canvas,
    #qrPreview img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
      box-shadow: 0 16px 36px rgba(24, 39, 58, .12);
    }

    .empty-state {
      width: min(260px, 100%);
      min-height: 220px;
      display: grid;
      place-items: center;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      text-align: center;
      font-weight: 800;
      line-height: 1.6;
      background: rgba(255,255,255,.62);
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      max-width: min(360px, calc(100vw - 36px));
      padding: 12px 14px;
      border-radius: var(--radius);
      background: #132033;
      color: #fff;
      box-shadow: var(--shadow);
      transform: translateY(90px);
      opacity: 0;
      transition: .2s ease;
      font-size: 14px;
      font-weight: 800;
    }

    .toast.visible {
      transform: translateY(0);
      opacity: 1;
    }

    @media (max-width: 900px) {
      .hero,
      .workspace { grid-template-columns: 1fr; }
      .sample-qr { min-height: 240px; }
    }

    @media (max-width: 620px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }
      .nav {
        width: 100%;
        flex-wrap: wrap;
        justify-content: flex-start;
      }
      .nav a { display: none; }
      .nav .ghost-button { display: inline-flex; }
      .brand span { font-size: 11px; }
      .control-grid { grid-template-columns: 1fr; }
      .actions > * { width: 100%; }
      .hero-copy { padding: 28px 20px; }
      .hero-copy p:not(.eyebrow) { overflow-wrap: anywhere; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="../index.html">
      <img class="brand-mark" src="../assets/ids-logo.png" alt="IDS">
      <span>IDS Hub<br>Tools and Games</span>
    </a>
    <nav class="nav" aria-label="メインメニュー">
      <a href="../index.html#tools">ツール</a>
      <a href="../index.html#about">特徴</a>
      <a class="ghost-button" href="../index.html">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"></path></svg>
        Hubへ戻る
      </a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Utility</p>
        <h1>QRコード生成<br>ツール</h1>
        <p>URLやテキストを入力して、その場でQRコードを作成できます。サイズと色を調整して、PNGとして保存できます。</p>
      </div>
      <div class="sample-qr" aria-hidden="true">
        <div class="qr-motif">
          <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>
    </section>

    <section class="workspace" aria-label="QRコード生成">
      <div class="panel input-panel">
        <div class="field">
          <label for="sourceText">テキスト / URL</label>
          <textarea id="sourceText" placeholder="https://kali-n-coder.github.io/IDS-hub/" spellcheck="false">https://kali-n-coder.github.io/IDS-hub/</textarea>
        </div>

        <div class="control-grid">
          <div class="field">
            <label for="qrSize">サイズ</label>
            <select id="qrSize">
              <option value="192">192 px</option>
              <option value="256" selected>256 px</option>
              <option value="320">320 px</option>
              <option value="512">512 px</option>
            </select>
          </div>
          <div class="field">
            <label for="foregroundColor">前景色</label>
            <input id="foregroundColor" type="color" value="#132033">
          </div>
          <div class="field">
            <label for="backgroundColor">背景色</label>
            <input id="backgroundColor" type="color" value="#ffffff">
          </div>
        </div>

        <div class="actions">
          <button class="primary-button" id="downloadButton" type="button">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12"></path><path d="m7 10 5 5 5-5"></path><path d="M5 21h14"></path></svg>
            PNGダウンロード
          </button>
          <button class="ghost-button" id="copyButton" type="button">
            <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            元テキストをコピー
          </button>
        </div>
      </div>

      <div class="panel preview-panel">
        <div class="preview-head">
          <h2>プレビュー</h2>
          <span class="status" id="qrStatus">準備完了</span>
        </div>
        <div class="qr-stage">
          <div id="qrPreview" aria-live="polite"></div>
        </div>
      </div>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    const sourceText = document.getElementById("sourceText");
    const qrSize = document.getElementById("qrSize");
    const foregroundColor = document.getElementById("foregroundColor");
    const backgroundColor = document.getElementById("backgroundColor");
    const qrPreview = document.getElementById("qrPreview");
    const qrStatus = document.getElementById("qrStatus");
    const downloadButton = document.getElementById("downloadButton");
    const copyButton = document.getElementById("copyButton");
    const toast = document.getElementById("toast");
    let toastTimer;

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("visible");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("visible"), 2200);
    }

    function generateQr() {
      const value = sourceText.value.trim();
      const size = Number(qrSize.value);
      qrPreview.innerHTML = "";

      if (!value) {
        qrPreview.innerHTML = '<div class="empty-state">入力するとQRコードを表示します</div>';
        qrStatus.textContent = "未入力";
        downloadButton.disabled = true;
        return;
      }

      new QRCode(qrPreview, {
        text: value,
        width: size,
        height: size,
        colorDark: foregroundColor.value,
        colorLight: backgroundColor.value,
        correctLevel: QRCode.CorrectLevel.H
      });

      qrStatus.textContent = `${size} px`;
      downloadButton.disabled = false;
    }

    function getQrCanvas() {
      const canvas = qrPreview.querySelector("canvas");
      if (canvas) return canvas;
      const img = qrPreview.querySelector("img");
      if (!img) return null;

      const canvasFromImage = document.createElement("canvas");
      canvasFromImage.width = img.naturalWidth;
      canvasFromImage.height = img.naturalHeight;
      const context = canvasFromImage.getContext("2d");
      context.drawImage(img, 0, 0);
      return canvasFromImage;
    }

    function downloadQr() {
      const canvas = getQrCanvas();
      if (!canvas) {
        showToast("先にテキストを入力してください");
        return;
      }

      const link = document.createElement("a");
      link.download = "ids-hub-qr-code.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    async function copySource() {
      const value = sourceText.value;
      if (!value) {
        showToast("コピーするテキストがありません");
        return;
      }

      try {
        await navigator.clipboard.writeText(value);
        showToast("元テキストをコピーしました");
      } catch (error) {
        sourceText.select();
        document.execCommand("copy");
        showToast("元テキストをコピーしました");
      }
    }

    [sourceText, qrSize, foregroundColor, backgroundColor].forEach((element) => {
      element.addEventListener("input", generateQr);
      element.addEventListener("change", generateQr);
    });
    downloadButton.addEventListener("click", downloadQr);
    copyButton.addEventListener("click", copySource);

    if (window.QRCode) {
      generateQr();
    } else {
      qrPreview.innerHTML = '<div class="empty-state">QRライブラリを読み込めませんでした</div>';
      qrStatus.textContent = "読み込みエラー";
      downloadButton.disabled = true;
    }
  </script>
</body>
</html>
