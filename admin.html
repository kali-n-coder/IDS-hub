<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IDS Hub Admin</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --ink: #132033;
      --muted: #66758a;
      --panel: #fff;
      --line: #dce4ee;
      --brand: #0969da;
      --green: #00876f;
      --red: #d64562;
      --dark: #172232;
      --radius: 8px;
      --shadow: 0 16px 42px rgba(24, 39, 58, .12);
      font-family: "Inter", "Noto Sans JP", "Yu Gothic", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
    }

    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--ink); }
    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    a { color: inherit; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px clamp(16px, 4vw, 42px);
      border-bottom: 1px solid var(--line);
      background: rgba(244, 247, 251, .9);
      backdrop-filter: blur(14px);
    }

    .brand { display: flex; align-items: center; gap: 12px; font-weight: 850; text-decoration: none; }
    .mark { width: 40px; height: 40px; border-radius: var(--radius); display: grid; place-items: center; background: linear-gradient(135deg, var(--brand), var(--green)); color: #fff; }
    .brand small { display: block; color: var(--muted); font-size: 12px; }

    main { width: min(1180px, 100%); margin: 0 auto; padding: 26px clamp(14px, 4vw, 42px) 48px; }
    .hero { display: flex; align-items: end; justify-content: space-between; gap: 20px; margin-bottom: 18px; }
    h1, h2, h3 { margin: 0; letter-spacing: 0; }
    h1 { font-size: clamp(32px, 5vw, 52px); }
    p { color: var(--muted); line-height: 1.7; }

    .grid { display: grid; grid-template-columns: 360px minmax(0, 1fr); gap: 16px; align-items: start; }
    .panel {
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .stack { display: grid; gap: 12px; }
    .field { display: grid; gap: 7px; }
    label { color: var(--muted); font-size: 12px; font-weight: 800; }
    input, textarea, select {
      width: 100%;
      min-height: 40px;
      padding: 9px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      outline: 0;
    }
    textarea { min-height: 92px; resize: vertical; }
    input:focus, textarea:focus, select:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(9, 105, 218, .12); }

    .actions { display: flex; flex-wrap: wrap; gap: 8px; }
    .button {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      font-weight: 800;
      text-decoration: none;
    }
    .button.primary { border-color: var(--brand); background: var(--brand); color: #fff; }
    .button.danger { border-color: var(--red); color: var(--red); }
    .button:disabled { opacity: .55; cursor: not-allowed; }

    .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
    .tab.active { border-color: var(--brand); color: var(--brand); background: rgba(9, 105, 218, .08); }
    .view { display: none; }
    .view.active { display: grid; gap: 12px; }

    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 10px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
    th { color: var(--muted); font-size: 12px; }
    .status { display: inline-flex; align-items: center; min-height: 24px; padding: 0 8px; border-radius: 999px; background: #eef3f8; color: var(--muted); font-size: 12px; font-weight: 800; }
    .status.on { background: #e8f7f2; color: var(--green); }
    .status.off { background: #fff0f2; color: var(--red); }
    .hidden { display: none !important; }
    .toast { position: fixed; right: 18px; bottom: 18px; z-index: 20; max-width: 340px; padding: 12px 14px; border-radius: var(--radius); background: var(--dark); color: #fff; box-shadow: var(--shadow); opacity: 0; transform: translateY(80px); transition: .2s ease; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .warning { border-color: #f0d18a; background: #fff8e7; color: #644500; box-shadow: none; }
    .warning p { margin: 0; color: #644500; }

    @media (max-width: 860px) {
      .grid { grid-template-columns: 1fr; }
      .hero { align-items: flex-start; flex-direction: column; }
      table { display: block; overflow-x: auto; white-space: nowrap; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">
      <span class="mark">IDS</span>
      <span>IDS Hub Admin<small>Tools and users</small></span>
    </a>
    <div class="actions">
      <a class="button" href="index.html">サイトへ戻る</a>
      <button class="button danger hidden" type="button" id="logoutButton">ログアウト</button>
    </div>
  </header>

  <main>
    <section class="hero">
      <div>
        <h1>管理画面</h1>
        <p>ユーザーとツールをFirestore上で管理します。</p>
      </div>
    </section>

    <section class="panel warning">
      <p>Firebase Authenticationを使わない構成のため、この管理画面はプロトタイプ向けです。公開運用ではCloud Functionsなどサーバー側の管理APIへ移すことを推奨します。</p>
    </section>

    <section class="grid" style="margin-top: 16px;">
      <form class="panel stack" id="loginPanel">
        <h2>管理者ログイン</h2>
        <div class="field">
          <label for="adminEmail">メールアドレス</label>
          <input id="adminEmail" name="email" type="email" autocomplete="email" required>
        </div>
        <div class="field">
          <label for="adminPassword">パスワード</label>
          <input id="adminPassword" name="password" type="password" autocomplete="current-password" required>
        </div>
        <button class="button primary" type="submit">ログイン</button>
      </form>

      <section class="panel hidden" id="dashboard">
        <div class="tabs">
          <button class="button tab active" type="button" data-view="toolsView">ツール</button>
          <button class="button tab" type="button" data-view="usersView">ユーザー</button>
        </div>

        <div class="view active" id="toolsView">
          <form class="stack" id="toolForm">
            <h2>ツール追加・編集</h2>
            <input type="hidden" id="toolId" name="id">
            <div class="field">
              <label for="toolName">名前</label>
              <input id="toolName" name="name" required>
            </div>
            <div class="field">
              <label for="toolDescription">説明</label>
              <textarea id="toolDescription" name="description" required></textarea>
            </div>
            <div class="field">
              <label for="toolUrl">URL</label>
              <input id="toolUrl" name="url" type="url" required>
            </div>
            <div class="field">
              <label for="toolCategory">カテゴリ</label>
              <select id="toolCategory" name="category">
                <option value="tool utility">日常ツール</option>
                <option value="tool dev">開発ツール</option>
                <option value="game">ゲーム</option>
              </select>
            </div>
            <div class="field">
              <label for="toolOrder">表示順</label>
              <input id="toolOrder" name="order" type="number" min="1" value="10">
            </div>
            <div class="actions">
              <button class="button primary" type="submit">保存</button>
              <button class="button" type="button" id="clearToolForm">新規入力</button>
            </div>
          </form>
          <div>
            <h3>登録済みツール</h3>
            <table>
              <thead><tr><th>名前</th><th>カテゴリ</th><th>状態</th><th>操作</th></tr></thead>
              <tbody id="toolsBody"></tbody>
            </table>
          </div>
        </div>

        <div class="view" id="usersView">
          <form class="stack" id="userForm">
            <h2>ユーザー追加</h2>
            <div class="field">
              <label for="userName">表示名</label>
              <input id="userName" name="name" required>
            </div>
            <div class="field">
              <label for="userEmail">メールアドレス</label>
              <input id="userEmail" name="email" type="email" required>
            </div>
            <div class="field">
              <label for="userPassword">パスワード</label>
              <input id="userPassword" name="password" type="password" minlength="8" required>
            </div>
            <div class="field">
              <label for="userRole">権限</label>
              <select id="userRole" name="role">
                <option value="user">user</option>
                <option value="admin">admin</option>
              </select>
            </div>
            <button class="button primary" type="submit">ユーザーを作成</button>
          </form>
          <div>
            <h3>登録済みユーザー</h3>
            <table>
              <thead><tr><th>メール</th><th>名前</th><th>権限</th><th>状態</th><th>操作</th></tr></thead>
              <tbody id="usersBody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs,
      doc,
      getDoc,
      setDoc,
      updateDoc,
      deleteDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      projectId: "idm-hub-20260516",
      appId: "1:315082566768:web:03c7c4b57f75ef9a01d8b5",
      storageBucket: "idm-hub-20260516.firebasestorage.app",
      apiKey: "AIzaSyC_nT_seXtKnZWff-76jvJT0EZfkL21TxE",
      authDomain: "idm-hub-20260516.firebaseapp.com",
      messagingSenderId: "315082566768"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const toast = document.querySelector("#toast");
    const dashboard = document.querySelector("#dashboard");
    const loginPanel = document.querySelector("#loginPanel");
    const logoutButton = document.querySelector("#logoutButton");
    let users = [];
    let tools = [];

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 3200);
    }

    function toBase64(value) {
      return btoa(unescape(encodeURIComponent(value)));
    }

    function normalizeEmail(email) {
      return String(email).trim().toLowerCase();
    }

    function slugify(value) {
      return String(value).trim().toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "") || `tool-${Date.now()}`;
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }

    async function loginAdmin(formData) {
      const email = normalizeEmail(formData.get("email"));
      const password = String(formData.get("password") || "");
      const snapshot = await getDoc(doc(db, "users", email));

      if (!snapshot.exists()) throw new Error("管理者ユーザーが見つかりません。");
      const user = snapshot.data();
      if (!user.enabled || user.role !== "admin" || user.passwordBase64 !== toBase64(password)) {
        throw new Error("管理者ログインに失敗しました。");
      }

      sessionStorage.setItem("idsHubAdmin", JSON.stringify({ email, name: user.name || "" }));
      loginPanel.classList.add("hidden");
      dashboard.classList.remove("hidden");
      logoutButton.classList.remove("hidden");
      await loadAll();
    }

    async function loadAll() {
      const [userSnapshot, toolSnapshot] = await Promise.all([
        getDocs(collection(db, "users")),
        getDocs(collection(db, "tools"))
      ]);

      users = userSnapshot.docs.map((item) => ({ id: item.id, ...item.data() })).sort((a, b) => a.email.localeCompare(b.email));
      tools = toolSnapshot.docs.map((item) => ({ id: item.id, ...item.data() })).sort((a, b) => Number(a.order || 999) - Number(b.order || 999));
      renderUsers();
      renderTools();
    }

    function renderTools() {
      document.querySelector("#toolsBody").innerHTML = tools.map((tool) => `
        <tr>
          <td><strong>${escapeHtml(tool.name)}</strong><br><small>${escapeHtml(tool.url)}</small></td>
          <td>${escapeHtml(tool.label || tool.category)}</td>
          <td><span class="status ${tool.enabled === false ? "off" : "on"}">${tool.enabled === false ? "停止" : "公開"}</span></td>
          <td>
            <div class="actions">
              <button class="button" type="button" data-edit-tool="${escapeHtml(tool.id)}">編集</button>
              <button class="button" type="button" data-toggle-tool="${escapeHtml(tool.id)}">${tool.enabled === false ? "公開" : "停止"}</button>
              <button class="button danger" type="button" data-delete-tool="${escapeHtml(tool.id)}">削除</button>
            </div>
          </td>
        </tr>
      `).join("");
    }

    function renderUsers() {
      document.querySelector("#usersBody").innerHTML = users.map((user) => `
        <tr>
          <td>${escapeHtml(user.email)}</td>
          <td>${escapeHtml(user.name)}</td>
          <td>
            <select data-user-role="${escapeHtml(user.id)}">
              <option value="user" ${user.role !== "admin" ? "selected" : ""}>user</option>
              <option value="admin" ${user.role === "admin" ? "selected" : ""}>admin</option>
            </select>
          </td>
          <td><span class="status ${user.enabled === false ? "off" : "on"}">${user.enabled === false ? "停止" : "有効"}</span></td>
          <td>
            <div class="actions">
              <button class="button" type="button" data-toggle-user="${escapeHtml(user.id)}">${user.enabled === false ? "有効化" : "停止"}</button>
              <button class="button" type="button" data-reset-user="${escapeHtml(user.id)}">PW再設定</button>
              <button class="button danger" type="button" data-delete-user="${escapeHtml(user.id)}">削除</button>
            </div>
          </td>
        </tr>
      `).join("");
    }

    document.querySelector("#loginPanel").addEventListener("submit", async (event) => {
      event.preventDefault();
      try {
        await loginAdmin(new FormData(event.currentTarget));
        showToast("管理者としてログインしました。");
      } catch (error) {
        showToast(error.message || "ログインに失敗しました。");
      }
    });

    document.querySelector("#toolForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const formData = new FormData(event.currentTarget);
      const id = formData.get("id") || slugify(formData.get("name"));
      const category = String(formData.get("category"));
      const label = category.includes("dev") ? "開発ツール" : category.includes("game") ? "ゲーム" : "日常ツール";
      const color = category.includes("game") ? "yellow" : category.includes("dev") ? "dark" : "green";

      await setDoc(doc(db, "tools", id), {
        name: String(formData.get("name")).trim(),
        description: String(formData.get("description")).trim(),
        url: String(formData.get("url")).trim(),
        category,
        label,
        color,
        keywords: `${formData.get("name")} ${category}`,
        enabled: true,
        order: Number(formData.get("order") || 999),
        updatedAt: serverTimestamp()
      }, { merge: true });

      event.currentTarget.reset();
      document.querySelector("#toolId").value = "";
      await loadAll();
      showToast("ツールを保存しました。");
    });

    document.querySelector("#userForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      const formData = new FormData(event.currentTarget);
      const email = normalizeEmail(formData.get("email"));
      const password = String(formData.get("password") || "");
      if (password.length < 8) {
        showToast("パスワードは8文字以上で入力してください。");
        return;
      }

      await setDoc(doc(db, "users", email), {
        name: String(formData.get("name")).trim(),
        email,
        passwordBase64: toBase64(password),
        enabled: true,
        role: String(formData.get("role")),
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      });

      event.currentTarget.reset();
      await loadAll();
      showToast("ユーザーを作成しました。");
    });

    document.addEventListener("click", async (event) => {
      const editToolId = event.target.dataset.editTool;
      const toggleToolId = event.target.dataset.toggleTool;
      const deleteToolId = event.target.dataset.deleteTool;
      const toggleUserId = event.target.dataset.toggleUser;
      const resetUserId = event.target.dataset.resetUser;
      const deleteUserId = event.target.dataset.deleteUser;

      if (editToolId) {
        const tool = tools.find((item) => item.id === editToolId);
        document.querySelector("#toolId").value = tool.id;
        document.querySelector("#toolName").value = tool.name || "";
        document.querySelector("#toolDescription").value = tool.description || "";
        document.querySelector("#toolUrl").value = tool.url || "";
        document.querySelector("#toolCategory").value = tool.category || "tool utility";
        document.querySelector("#toolOrder").value = tool.order || 10;
      }

      if (toggleToolId) {
        const tool = tools.find((item) => item.id === toggleToolId);
        await updateDoc(doc(db, "tools", toggleToolId), { enabled: tool.enabled === false, updatedAt: serverTimestamp() });
        await loadAll();
      }

      if (deleteToolId && confirm("このツールを削除しますか？")) {
        await deleteDoc(doc(db, "tools", deleteToolId));
        await loadAll();
      }

      if (toggleUserId) {
        const user = users.find((item) => item.id === toggleUserId);
        await updateDoc(doc(db, "users", toggleUserId), { enabled: user.enabled === false, updatedAt: serverTimestamp() });
        await loadAll();
      }

      if (resetUserId) {
        const password = prompt("新しいパスワードを8文字以上で入力してください。");
        if (password && password.length >= 8) {
          await updateDoc(doc(db, "users", resetUserId), { passwordBase64: toBase64(password), updatedAt: serverTimestamp() });
          showToast("パスワードを更新しました。");
        }
      }

      if (deleteUserId && confirm("このユーザーを削除しますか？")) {
        await deleteDoc(doc(db, "users", deleteUserId));
        await loadAll();
      }
    });

    document.addEventListener("change", async (event) => {
      const userId = event.target.dataset.userRole;
      if (userId) {
        await updateDoc(doc(db, "users", userId), { role: event.target.value, updatedAt: serverTimestamp() });
        await loadAll();
        showToast("権限を更新しました。");
      }
    });

    document.querySelector("#clearToolForm").addEventListener("click", () => {
      document.querySelector("#toolForm").reset();
      document.querySelector("#toolId").value = "";
    });

    document.querySelectorAll(".tab").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach((tab) => tab.classList.toggle("active", tab === button));
        document.querySelectorAll(".view").forEach((view) => view.classList.toggle("active", view.id === button.dataset.view));
      });
    });

    logoutButton.addEventListener("click", () => {
      sessionStorage.removeItem("idsHubAdmin");
      location.reload();
    });

    if (sessionStorage.getItem("idsHubAdmin")) {
      loginPanel.classList.add("hidden");
      dashboard.classList.remove("hidden");
      logoutButton.classList.remove("hidden");
      loadAll();
    }
  </script>
</body>
</html>
